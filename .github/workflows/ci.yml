name: BugSight AI CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt
      - name: Check Python Syntax
        run: |
          python -m py_compile backend/app.py
          python -m py_compile backend/predict.py
          python -m py_compile frontend/app.py
          python -m py_compile frontend/predict.py
          python -m py_compile frontend/api.py
