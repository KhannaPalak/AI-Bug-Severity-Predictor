apiVersion: apps/v1
kind: Deployment
metadata:
  name: bug-frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bug-frontend
  template:
    metadata:
      labels:
        app: bug-frontend
    spec:
      containers:
      - name: bug-frontend
        image: bug-frontend:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: bug-frontend-service
spec:
  selector:
    app: bug-frontend
  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501
  type: NodePort
