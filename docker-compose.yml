version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: bugsight_backend

    ports:
      - "8000:8000"

    volumes:
      - ./models:/models

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile

    container_name: bugsight_frontend

    ports:
      - "8501:8501"

    depends_on:
      - backend